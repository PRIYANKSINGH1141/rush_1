name: gha-migration/rush_1

on:
  ##push:
  workflow_dispatch:
    inputs:
      RUNTIME_CUSTOM_VALUE:
        description: "Enter Runtime Value of CUSTOM_VALUE"
        required: true
        type: string
        default: "Demo Value"
        
      TARGET_ENV:
        description: 'Enter Runtime values of TARGET_ENV'
        required: true
        type: string
        default: "Demo Value"

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_NAME: demo-app
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - name: Compile Application
      run: echo "Building $APP_NAME..."
    - name: Generate Build Report
      run: echo "Docker Image Build Successful.." > build.txt
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: build
        retention-days: 1
        path: build.txt

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_NAME: demo-app
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - name: Download Build Artifact
      uses: actions/download-artifact@v4.1.0
      with:
        name: build
        path: .
    - name: Read Build Logs
      run: |
        echo "Reading artifact from build stage..."
        cat build.txt
    - name: Execute Test Suite
      run: |
        echo "Running Tests..."
        echo "Tests Passed" > test.txt
    - name: Upload Test Artifact
      uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: test
        retention-days: 1
        path: test.txt

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_NAME: demo-app
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - name: Download Test Artifact
      uses: actions/download-artifact@v4.1.0
      with:
        name: test
        path: .
    - name: Run Deployment Scripts
      run: |
        echo "Deploying Application..."
        cat test.txt
    - name: Print Configuration Details
      run: |
        echo "=========================================================="
        echo "SUCCESS! The values you entered in the UI prompt are:"
        echo "Custom Value: ${{ inputs.RUNTIME_CUSTOM_VALUE }}"
        echo "Target Environment: ${{ inputs.TARGET_ENV }}"
        echo "=========================================================="
